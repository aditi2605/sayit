# render.yaml — put this in the root of your sayit repo
services:
  - type: web
    name: sayit-api
    runtime: docker
    dockerfilePath: ./sayit-backend/Dockerfile
    dockerContext: ./sayit-backend
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  
      - key: JWT_SECRET
        generateValue: true 
      - key: ALLOWED_ORIGINS
        sync: false  
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
