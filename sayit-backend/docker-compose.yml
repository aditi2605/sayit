version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sayit-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sayit
      POSTGRES_USER: sayit_user
      POSTGRES_PASSWORD: sayit_local_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sayit_user -d sayit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sayit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
